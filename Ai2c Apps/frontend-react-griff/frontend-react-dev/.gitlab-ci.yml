variables:
  NODE_IMAGE: 'node:23'
  TARGET:
    description: Which region to deploy the application into?
    options:
      - dev
      - test
      - prod
    value: dev

before_script:
  - |
    export CDSO_VALUE="DEVELOPMENT"
    CDSO_VER=0.0.1
    if [ ! -z "${CI_COMMIT_TAG}" ]; then
     CDSO_VER=${CI_COMMIT_TAG}
     export CDSO_VALUE="PRODUCTION"
    fi
    echo "Setting CDSO Version as ${CDSO_VER}"
    echo "Setting deployment level to ${CDSO_VALUE}"
    echo "Updating CDSO File..."
    if [ -f "$(which yq)" ]; then
      yq e '.frontend.version = strenv(CDSO_VER)' -i cdso_config.yml
      yq e '.deployment_level = strenv(CDSO_VALUE)' -i cdso_config.yml
    else
      sed -i 's/\${BACKEND_VERSION}/'"${CDSO_VER}"'/' cdso_config.yml
      sed -i 's/PRODUCTION/'"${CDSO_VALUE}"'/' cdso_config.yml
    fi

stages:
  - pre-build
  - pre-test
  - build
  - post-build
  - post-test
  - review
  - clean
  - deliver

include:
  # Minimum required fields for a container project
  - component: $CI_SERVER_FQDN/cdso/cdso/review@main
    inputs:
      name: 'frontend'
      pipeline_type: 'application-container'
    # rules:
    #   - if: '$CI_COMMIT_REF_NAME == /^epic-.*$/ || $CI_COMMIT_REF_NAME == "dev" || $CI_COMMIT_REF_NAME == "test" || $CI_COMMIT_REF_NAME == "prod"'
    #     when: always
    #   - when: never
  # Continuous Delivery pipeline for the backend container.
  - component: $CI_SERVER_FQDN/ai2c/caravan/pipelines/deliver@main
    # Only run deliver when a tag is created.
    rules:
      - if: |
          $CI_COMMIT_TAG &&
          ($TARGET == "dev" || $TARGET == "" || $TARGET == null)
        when: always
      - when: never
    inputs:
      name: frontend
      pipeline_type: container
      expedition: 0
      environment: dev

  # Continuous Delivery pipeline for the backend container.
  - component: $CI_SERVER_FQDN/ai2c/caravan/pipelines/deliver@main
    # Only run deliver when a tag is created.
    rules:
      - if: |
          $CI_COMMIT_TAG &&
          $TARGET == "test"
        when: always
      - when: never
    inputs:
      name: frontend
      pipeline_type: container
      expedition: 0
      environment: test

  # Continuous Delivery pipeline for the backend container.
  - component: $CI_SERVER_FQDN/ai2c/caravan/pipelines/deliver@main
    # Only run deliver when a tag is created.
    rules:
      - if: |
          $CI_COMMIT_TAG &&
          $TARGET == "prod"
        when: always
      - when: never
    inputs:
      name: frontend
      pipeline_type: container
      expedition: 0
      environment: prod

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: never
    - when: always

.npm_config:
  before_script:
    - |
      # Setting up ENV
      export REACT_ENV=development
      export KEYCLOAK_URL=https://sso.dev.ai.army.mil
      if [ "${TARGET}" == "prod" ]; then
        export REACT_ENV=production
        export KEYCLOAK_URL=https://sso.ai.army.mil
      fi
      if [ "${TARGET}" == "test" ]; then
        export REACT_ENV=test
        export KEYCLOAK_URL=https://sso.test.ai.army.mil
      fi
      echo "NODE_ENV=${REACT_ENV}" >> .env.${REACT_ENV}
      echo "VITE_APP_TITLE=\"$VITE_APP_TITLE\"" >> .env.${REACT_ENV}
      echo "VITE_GRIFFIN_API_URL=\"$VITE_GRIFFIN_API_URL\"" >> .env.${REACT_ENV}
      echo "VITE_GRIFFIN_BASE_URL=\"$VITE_GRIFFIN_BASE_URL\"" >> .env.${REACT_ENV}
      echo "VITE_AMAP_API_URL=\"/amap/data/v1\"" >> .env.${REACT_ENV}
      echo "VITE_FF_INDEX_ROUTE=\"$VITE_FF_INDEX_ROUTE\"" >> .env.${REACT_ENV}
      echo "VITE_FF_ACCOUNT_MANAGEMENT=\"$VITE_FF_ACCOUNT_MANAGEMENT\"" >> .env.${REACT_ENV}
      echo "VITE_FF_COMPONENT_MANAGEMENT=\"$VITE_FF_COMPONENT_MANAGEMENT\"" >> .env.${REACT_ENV}
      echo "VITE_FF_MAINTENANCE_SCHEDULE=\"$VITE_FF_MAINTENANCE_SCHEDULE\"" >> .env.${REACT_ENV}
      echo "VITE_FF_MAINTENANCE_SCHEDULE_CALENDAR=\"$VITE_FF_MAINTENANCE_SCHEDULE_CALENDAR\"" >> .env.${REACT_ENV}
      echo "VITE_FF_MAINTENANCE_SCHEDULE_PHASE_FLOW=\"$VITE_FF_MAINTENANCE_SCHEDULE_PHASE_FLOW\"" >> .env.${REACT_ENV}
      echo "VITE_FF_READINESS_ANALYTICS=\"$VITE_FF_READINESS_ANALYTICS\"" >> .env.${REACT_ENV}
      echo "VITE_FF_READINESS_ANALYTICS_EQUIPMENT=\"$VITE_FF_READINESS_ANALYTICS_EQUIPMENT\"" >> .env.${REACT_ENV}
      echo "VITE_FF_READINESS_ANALYTICS_MAINTENANCE_TIME=\"$VITE_FF_READINESS_ANALYTICS_MAINTENANCE_TIME\"" >> .env.${REACT_ENV}
      echo "VITE_FF_READINESS_ANALYTICS_OVERVIEW=\"$VITE_FF_READINESS_ANALYTICS_OVERVIEW\"" >> .env.${REACT_ENV}
      echo "VITE_FF_READINESS_ANALYTICS_PERSONNEL=\"$VITE_FF_READINESS_ANALYTICS_PERSONNEL\"" >> .env.${REACT_ENV}
      echo "VITE_FF_READINESS_ANALYTICS_TRAINING=\"$VITE_FF_READINESS_ANALYTICS_TRAINING\"" >> .env.${REACT_ENV}
      echo "VITE_FF_TASK_FORCES=\"$VITE_FF_TASK_FORCES\"" >> .env.${REACT_ENV}
      echo "VITE_FF_EQUIPMENT_MANAGER=\"$VITE_FF_EQUIPMENT_MANAGER\"" >> .env.${REACT_ENV}
      echo "VITE_FF_EQUIPMENT_MANAGER_AIRCRAFT=\"$VITE_FF_EQUIPMENT_MANAGER_AIRCRAFT\"" >> .env.${REACT_ENV}
      echo "VITE_FF_EQUIPMENT_MANAGER_UAS=\"$VITE_FF_EQUIPMENT_MANAGER_UAS\"" >> .env.${REACT_ENV}
      echo "VITE_FF_EQUIPMENT_MANAGER_AGSE=\"$VITE_FF_EQUIPMENT_MANAGER_AGSE\"" >> .env.${REACT_ENV}
      echo "VITE_FF_FLIGHT_HOUR_PROGRAM=\"$VITE_FF_FLIGHT_HOUR_PROGRAM\"" >> .env.${REACT_ENV}
      echo "VITE_FF_FLIGHT_HOUR_PROGRAM_OVERVIEW=\"$VITE_FF_FLIGHT_HOUR_PROGRAM_OVERVIEW\"" >> .env.${REACT_ENV}
      echo "VITE_FF_FLIGHT_HOUR_PROGRAM_CALCULATOR=\"$VITE_FF_FLIGHT_HOUR_PROGRAM_CALCULATOR\"" >> .env.${REACT_ENV}
      echo "VITE_FF_FLIGHT_HOUR_PROGRAM_SAVED_COAS=\"$VITE_FF_FLIGHT_HOUR_PROGRAM_SAVED_COAS\"" >> .env.${REACT_ENV}
      echo "VITE_KEYCLOAK_URL=\"$KEYCLOAK_URL\"" >> .env.${REACT_ENV}
      echo "VITE_KEYCLOAK_REALM=\"uds\"" >> .env.${REACT_ENV}
      echo "VITE_KEYCLOAK_CLIENT=\"griffin\"" >> .env.${REACT_ENV}
      echo "Using React Env File of .env.${REACT_ENV}"
      cat .env.${REACT_ENV}
      # Configure npm
      rm -Rf node_modules
      npm config set @ai2c:registry 'https://code.cdso.army.mil/api/v4/projects/3083/packages/npm/'
      # Set TLS Strict to false as Nexus certs are internal
      npm config set strict-ssl false
      npm config set fetch-retry-maxtimeout 600000
      npm config set fetch-retry-mintimeout 480000
      npm config set fetch-timeout 600000
      npm config set fetch-retries 4
      npm config set maxsockets 50
      npm cache clean -f
      # Install system dependencies for canvas
      apt-get update && apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      npm i --no-audit --progress=false --legacy-peer-deps --save-dev

lint:
  stage: pre-build
  image: ${NODE_IMAGE}
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  tags:
    - cdso-large
  environment:
    name: ${TARGET}
  extends: .npm_config
  script:
    - npm run lint

test:
  timeout: 2h
  stage: pre-build
  image: ${NODE_IMAGE}
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  tags:
    - cdso-large
  environment:
    name: ${TARGET}
  extends: .npm_config
  script:
    - npm run coverage:gitlab
  coverage: '/All files[^\|]*\|[^\|]*\s+([\d\.]+)/'
  artifacts:
    paths:
      - coverage
    reports:
      junit: junit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

version:
  stage: clean
  image: registry.cdso.army.mil/cdso/containers/approved-base/alpine:3.21
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_COMMIT_REF_NAME == "dev"'
      when: on_success
  script:
    - apk add --no-cache git
    - VERSION_DATE=`date +%Y.%m.%d-`
    - case "${CI_COMMIT_REF_NAME}" in
      "epic-"*)
      SUFFIX=`echo ${CI_COMMIT_REF_NAME} | awk -F- '{print $1 "-" $2}'`
      SUFFIX="${SUFFIX}-${CI_PIPELINE_IID}"
      ;;
      *)
      SUFFIX="${CI_PIPELINE_IID}"
      ;;
      esac
    - VERSION="v${VERSION_DATE}${SUFFIX}"
    - echo "Version will be ${VERSION}"
    - git remote set-url origin "https://gitlab-ci-token:${CI_TAG_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git config user.email "gitlab-ci@example.com"
    - git config user.name "GitLab CI"
    - git tag -a ${VERSION} -m "CI/CD Version creation - ${VERSION}"
    - git push origin ${VERSION}

build:
  stage: pre-build
  image: ${NODE_IMAGE}
  tags:
    - cdso-large
  environment:
    name: ${TARGET}
  extends: .npm_config
  script:
    - npm run build:${TARGET}
    - echo "BUILD_ENV=${TARGET}" >> .buildargs
  artifacts:
    paths:
      - .env.*
      - .buildargs
    name: '${CI_JOB_NAME}'
    when: always

update_version:
  stage: deliver
  image: registry.cdso.army.mil/cdso/containers/approved-base/alpine:3.21
  rules:
    - if: $CI_COMMIT_TAG &&
        ($TARGET == "dev" || $TARGET == "" || $TARGET == null)
      when: on_success
  script:
    - |
      if [ -z "${TARGET}" -o "${TARGET}" == "" ]; then
       TARGET=dev
      fi
      apk add --no-cache curl
      echo "Updating version to ${CI_COMMIT_TAG} for deployment to ${TARGET}"
      curl --request PUT --header "Private-Token: ${CI_TAG_TOKEN}" --header "Content-Type: application/json" \
      "https://${CI_SERVER_HOST}/api/v4/projects/3630/variables/REACT_VERSION?value=${CI_COMMIT_TAG}&environment_scope=expedition-0-${TARGET}&filter\[environment_scope\]=expedition-0-${TARGET}"
      echo ""
      # Sleeping for a minute to allow container image to be copied into registry before triggering deployment.
      sleep 60
      # echo "Triggering deployment to ${TARGET}"
      # curl --request POST --form token="${CI_TRIGGER_TOKEN}" --form ref=${HELM_TAG} --form "variables\[UDS_BUNDLE_TASK\]=deploy" --form "variables\[TARGET\]=${TARGET}" "https://code.cdso.army.mil/api/v4/projects/3630/trigger/pipeline"

deployment:
  stage: deliver
  rules:
    - if: $CI_COMMIT_TAG &&
        ($TARGET == "dev" || $TARGET == "" || $TARGET == null)
      when: on_success
  needs:
    - job: update_version
      artifacts: false
  trigger:
    project: ai2c/griffin/helm
    branch: ${HELM_TAG}
  variables:
    UDS_BUNDLE_TASK: 'deploy'

pages:
  stage: pre-build
  image: ${NODE_IMAGE}
  pages: true
  allow_failure: true
  extends: .npm_config
  only:
    - dev
  script:
    - |
      npm i --no-audit --progress=false --legacy-peer-deps --save-dev @react-docgen/cli typedoc tsx
      cd docs
      npx typedoc --options typedoc_conf.json --entryPointStrategy Expand ../src
  artifacts:
    paths:
      - public
